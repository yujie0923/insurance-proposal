            if (currentSlide === 3) {
                renderProductTabs();
                renderProductContent(activeTab);
            }
            
            // 重新載入 Lucide Icons
            lucide.createIcons();
        }

        // --- 商品頁渲染邏輯 ---
        function renderProductTabs() {
            const tabsContainer = document.getElementById('product-tabs-container');
            if(!tabsContainer) return;
            
            tabsContainer.innerHTML = productTabs.map(tab => {
                const isActive = activeTab === tab.id;
                const activeClasses = isActive ? `bg-gray-50 border-${tab.borderColor.split('-')[1]}-600 text-gray-900` : 'border-transparent text-gray-500 hover:bg-gray-50 hover:text-gray-700';
                const iconColor = isActive ? tab.color : 'text-gray-400';
                
                // 行內樣式強制指定底線顏色以覆蓋 Tailwind 未編譯問題
                const style = isActive ? `style="border-bottom-color: currentColor;"` : '';

                return `
                <button onclick="switchTab('${tab.id}')" class="flex items-center gap-2 px-5 py-3 rounded-t-xl font-bold transition-all whitespace-nowrap border-b-4 ${activeClasses}" ${style}>
                    <i data-lucide="${tab.icon}" class="w-5 h-5 ${iconColor}"></i>
                    <span class="${isActive ? tab.color : ''}">${tab.label}</span>
                </button>
                `;
            }).join('');
        }

        function switchTab(tabId) {
            activeTab = tabId;
            renderProductTabs();
            renderProductContent(tabId);
            lucide.createIcons();
        }

        function renderProductContent(tabId) {
            const contentContainer = document.getElementById('product-content-container');
            if(!contentContainer) return;

            const products = productsData[tabId] || [];
            let html = '<div class="flex flex-col gap-5">';

            products.forEach(item => {
                if (item.type === 'section') {
                    html += `
                    <div class="w-full mb-2 mt-6 first:mt-0">
                        <h3 class="text-2xl font-black text-[#4a4036] flex items-center gap-2 mb-1">
                            <i data-lucide="shield-alert" class="w-6 h-6 text-[#8c7a6b]"></i> ${item.title}
                        </h3>
                        ${item.subtitle ? `<p class="text-sm font-bold text-[#8c7a6b] ml-8">${item.subtitle}</p>` : ''}
                        <div class="h-1 w-full bg-gradient-to-r from-[#8c7a6b] to-transparent mt-2 rounded-full opacity-50"></div>
                    </div>`;
                } else if (item.type === 'custom') {
                    html += item.html;
                } else {
                    const featuresHtml = item.features.map(f => {
                        // 如果字串包含 div 則直接印出(通常為特別備註)，否則加上打勾icon
                        if(f.trim().startsWith('<div')) return f;
                        return `<p><i data-lucide="check" class="w-4 h-4 inline text-green-500 mr-1"></i>${f}</p>`;
                    }).join('');

                    html += `
                    <div class="w-full bg-white rounded-xl shadow-sm border-l-4 ${item.color} border-y border-r border-gray-200 flex flex-col lg:flex-row relative overflow-hidden group hover:shadow-md transition-shadow">
                        ${item.discontinued ? `<div class="absolute top-0 right-0 bg-gray-500 text-white text-[10px] font-bold px-4 py-1 rounded-bl-lg shadow-sm tracking-widest z-10 pointer-events-none">已停售</div>` : ''}
                        
                        <!-- 左側：商品基本資訊 -->
                        <div class="w-full lg:w-1/3 bg-gray-50/50 p-5 border-b lg:border-b-0 lg:border-r border-gray-200 flex flex-col justify-center">
                            <div class="flex items-center gap-2 mb-1.5">
                                <h4 class="font-black text-2xl tracking-tight ${item.discontinued ? 'text-gray-400 line-through' : 'text-gray-900'}">${item.code}</h4>
                                ${item.interest ? `<span class="bg-blue-100 text-blue-800 px-2 py-0.5 text-[10px] font-bold rounded-full border border-blue-200 flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> 利變型</span>` : ''}
                            </div>
                            <span class="text-base font-bold mb-3 ${item.discontinued ? 'text-gray-400' : 'text-[#5a4f43]'}">${item.title}</span>
                            <div class="flex flex-wrap gap-2 mt-auto">
                                ${item.minUnit ? `<span class="px-2.5 py-1 text-xs font-black rounded text-white ${item.discontinued ? 'bg-gray-400' : 'bg-orange-600'}">最低 ${item.minUnit}</span>` : ''}
                                ${item.recommend ? `<span class="px-2.5 py-1 text-xs font-black rounded border ${item.discontinued ? 'border-gray-300 text-gray-400' : 'border-red-200 text-red-600 bg-red-50'}">建議 ${item.recommend}</span>` : ''}
                            </div>
                        </div>

                        <!-- 右側：商品特點與內容 -->
                        <div class="w-full lg:w-2/3 p-5 flex flex-col">
                            ${item.highlight && !item.discontinued ? `
                            <div class="bg-orange-50/80 rounded-md p-2.5 mb-3 border border-orange-100 text-sm font-bold text-orange-900 flex items-start gap-2">
                                <i data-lucide="target" class="w-4 h-4 text-orange-600 shrink-0 mt-0.5"></i>
                                <span>${item.highlight}</span>
                            </div>` : ''}
                            
                            <div class="text-sm space-y-2 leading-relaxed font-medium flex-grow ${item.discontinued ? 'text-gray-400' : 'text-gray-700'}">
                                ${featuresHtml}
                            </div>

                            ${item.ageLimit ? `
                            <div class="mt-4 pt-3 border-t border-gray-100 text-xs font-semibold text-right ${item.discontinued ? 'text-gray-400' : 'text-gray-500'} tracking-wide">
                                ${item.ageLimit}
                            </div>` : ''}
                        </div>
                    </div>
                    `;
                }
            });

            html += '</div>';
            contentContainer.innerHTML = html;
        }

        // 啟動系統
        init();
    </script>
</body>
</html>
