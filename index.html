<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全方位保險規劃 - 趙于翔</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f6f3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { background-color: #8c7a6b; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 圖示元件
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- 共用組件 ---
        const StickyNote = ({ title, code, minUnit, recommend, color = "bg-yellow-200", rotation = "-rotate-1", discontinued = false, interestSensitive = false, ageLimit, children }) => (
            <div className={`${color} p-4 rounded-md shadow-md transform ${rotation} hover:scale-105 transition-all duration-200 border border-black/5 flex flex-col relative overflow-hidden`}>
                {discontinued && (
                    <div className="absolute top-3 -right-6 bg-gray-500/80 text-white text-[10px] font-bold px-6 py-1 rotate-45 shadow-sm z-10 pointer-events-none">已停售</div>
                )}
                <div className="flex justify-between items-start border-b border-black/10 pb-2 mb-2">
                    <div className="pr-2 flex-grow">
                        <div className="flex items-center gap-1">
                            <h4 className={`font-extrabold text-lg leading-none ${discontinued ? 'text-gray-500 line-through' : 'text-gray-800'}`}>{code}</h4>
                            {interestSensitive && <span className="bg-blue-100 text-blue-700 px-1 py-0.5 text-[9px] font-bold rounded border border-blue-300">利變</span>}
                        </div>
                        <span className={`text-xs font-semibold mt-1 inline-block ${discontinued ? 'text-gray-500' : 'text-gray-600'}`}>{title}</span>
                    </div>
                    {minUnit && <span className="px-1.5 py-0.5 text-[10px] font-bold rounded bg-white/90 text-[#c2410c] border border-[#fdba74]">最低{minUnit}</span>}
                </div>
                <div className={`text-sm space-y-1.5 leading-relaxed font-medium flex-grow ${discontinued ? 'text-gray-500' : 'text-gray-800'}`}>{children}</div>
                <div className="mt-3 pt-2 border-t border-black/10">
                    {recommend && <div className="text-[12px] font-bold text-red-600">建議規劃: {recommend}</div>}
                    {ageLimit && <div className="text-[10px] font-bold text-right text-[#6b5f54]">{ageLimit}</div>}
                </div>
            </div>
        );

        const SectionTitle = ({ title }) => (
            <h3 className="text-xl font-bold text-[#4a4036] border-b-2 border-[#8c7a6b] pb-2 mb-4 mt-8 first:mt-0 col-span-full flex items-center gap-2">
                <Icon name="shield-check" /> {title}
            </h3>
        );

        // --- 頁面內容 ---
        const PageHome = () => (
            <div className="flex flex-col items-center justify-center min-h-[80vh] text-center px-6">
                <div className="w-24 h-24 bg-[#8c7a6b] rounded-full flex items-center justify-center mb-8 shadow-xl text-white">
                    <Icon name="file-heart" className="w-12 h-12" />
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-[#4a4036] mb-4 tracking-tighter">全方位保險規劃</h1>
                <h2 className="text-xl md:text-2xl text-[#8c7a6b] mb-12 tracking-widest font-light uppercase">Risk Planning Proposal</h2>
                <div className="w-full max-w-sm border-t border-[#d4cfc9] pt-8">
                    <p className="text-[#8c7a6b] font-medium">專屬保險規劃顧問</p>
                    <p className="text-4xl font-black text-[#4a4036] mt-2">趙于翔</p>
                    <div className="flex justify-center gap-4 mt-6">
                        <span className="flex items-center gap-1 text-sm bg-white px-3 py-1 rounded-full shadow-sm text-[#8c7a6b] border border-[#e6e2dd]"><Icon name="check-circle" className="w-3 h-3"/> 專業分析</span>
                        <span className="flex items-center gap-1 text-sm bg-white px-3 py-1 rounded-full shadow-sm text-[#8c7a6b] border border-[#e6e2dd]"><Icon name="check-circle" className="w-3 h-3"/> 量身定做</span>
                    </div>
                </div>
            </div>
        );

        const PageConcept = () => (
            <div className="space-y-8 animate-in fade-in duration-500">
                <div className="border-l-8 border-[#8c7a6b] pl-6">
                    <h2 className="text-3xl font-black text-[#4a4036]">核心理財觀念</h2>
                    <p className="text-lg text-[#8c7a6b]">用 10% 風險預算，守護 90% 的資產</p>
                </div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-[#e6e2dd]">
                        <h3 className="font-bold text-[#4a4036] mb-6 flex items-center gap-2 text-lg"><Icon name="trending-up" /> 人生收支缺口</h3>
                        <div className="aspect-video bg-[#faf9f7] rounded-xl flex items-center justify-center border border-dashed border-[#d4cfc9]">
                            {/* 此處可放置 SVG 圖表 */}
                            <span className="text-gray-400">人生各階段風險分析圖</span>
                        </div>
                        <ul className="mt-6 space-y-3 text-gray-700">
                            <li className="flex gap-2"><Icon name="alert-triangle" className="text-orange-500 w-5 h-5" /> <strong>活太短：</strong> 家庭責任與債務留存</li>
                            <li className="flex gap-2"><Icon name="hourglass" className="text-blue-500 w-5 h-5" /> <strong>活太長：</strong> 退休金與長壽風險</li>
                            <li className="flex gap-2"><Icon name="activity" className="text-red-500 w-5 h-5" /> <strong>走不了：</strong> 醫療與長期照顧支出</li>
                        </ul>
                    </div>
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-[#e6e2dd] flex flex-col justify-center items-center">
                        <h3 className="font-bold text-[#4a4036] mb-6 text-lg">保險金字塔架構</h3>
                        <div className="w-full max-w-xs space-y-2">
                            <div className="bg-[#f5f1ea] p-4 text-center rounded-t-full font-bold border-b border-white">資產傳承</div>
                            <div className="bg-[#e8e4db] p-6 text-center font-bold border-b border-white">財務規劃 / 儲蓄</div>
                            <div className="bg-[#d4cfc9] p-8 text-center rounded-b-lg font-bold">醫療保障 (基礎)</div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const PageCheckup = () => (
            <div className="space-y-6">
                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h2 className="text-3xl font-black text-[#4a4036]">保單健診與互動分析</h2>
                    <div className="text-sm bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                        <Icon name="info" /> 點擊欄位即可直接輸入內容
                    </div>
                </div>
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-[#e6e2dd]">
                    <table className="w-full text-left">
                        <thead className="bg-[#4a4036] text-white">
                            <tr>
                                <th className="p-5 font-bold">保障項目</th>
                                <th className="p-5 font-bold">原有額度</th>
                                <th className="p-5 font-bold">缺口/建議</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                            {['壽險保障', '意外傷害', '醫療實支', '癌症/重疾', '長期照顧'].map((item, i) => (
                                <tr key={i} className="hover:bg-gray-50 transition-colors">
                                    <td className="p-5 font-bold text-gray-800">{item}</td>
                                    <td className="p-5"><input type="text" placeholder="輸入額度..." className="w-full bg-transparent border-b border-dashed border-gray-300 focus:border-blue-500 outline-none p-1 text-blue-600 font-medium" /></td>
                                    <td className="p-5"><textarea placeholder="專業建議..." className="w-full bg-transparent border-b border-dashed border-gray-300 focus:border-red-500 outline-none p-1 text-red-600 text-sm h-10 resize-none" /></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const PageProducts = () => {
            const [cat, setCat] = useState('medical');
            const categories = [
                { id: 'life', label: '壽險', icon: 'shield' },
                { id: 'medical', label: '醫療', icon: 'stethoscope' },
                { id: 'cancer', label: '癌症', icon: 'heart-pulse' },
                { id: 'ltc', label: '長照', icon: 'user-round' },
            ];

            return (
                <div className="space-y-6">
                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                        {categories.map(c => (
                            <button key={c.id} onClick={() => setCat(c.id)} className={`flex items-center gap-2 px-6 py-3 rounded-full font-bold whitespace-nowrap transition-all ${cat === c.id ? 'bg-[#8c7a6b] text-white shadow-lg scale-105' : 'bg-white text-gray-500 border border-gray-200'}`}>
                                <Icon name={c.icon} className="w-4 h-4"/> {c.label}
                            </button>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in zoom-in duration-300">
                        {cat === 'medical' && (
                            <>
                                <StickyNote code="1HS" title="實踐幸福醫療附約" recommend="計畫B" color="bg-sky-50" ageLimit="0-70歲 | 續保至74歲">
                                    <p>• 病房費: 3,000元/天</p>
                                    <p>• 手術雜費: 限額 20 萬元</p>
                                    <p>• 門診手術亦有保障</p>
                                </StickyNote>
                                <StickyNote code="HPHI2" title="溢心守護2終身醫療" recommend="1000元" color="bg-blue-50" ageLimit="0-65歲 | 終身保障">
                                    <p>• 終身手術帳戶</p>
                                    <p>• 住院/門診定額理賠</p>
                                </StickyNote>
                                <StickyNote code="HS" title="醫療實支(早期)" discontinued={true} color="bg-gray-100">
                                    <p>早期經典實支實付</p>
                                    <p>已由 1HS 全面取代</p>
                                </StickyNote>
                            </>
                        )}
                        {cat === 'life' && (
                            <StickyNote code="AYWTPL" title="佳倍享利變終身" recommend="100萬起" color="bg-indigo-50" interestSensitive={true} ageLimit="資產傳承首選">
                                <p>• 宣告利率獲取增額回饋</p>
                                <p>• 身故保障隨年期增長</p>
                            </StickyNote>
                        )}
                        {/* 其他分類可按此模式擴充 */}
                    </div>
                </div>
            );
        };

        const PageContact = () => (
            <div className="flex items-center justify-center min-h-[70vh]">
                <div className="bg-[#4a4036] text-white p-12 rounded-[3rem] shadow-2xl w-full max-w-lg text-center relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                    <h2 className="text-2xl font-bold mb-10 tracking-widest border-b border-white/10 pb-4">聯絡資訊</h2>
                    <div className="w-24 h-24 bg-[#a39171] rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-white/20 shadow-inner">
                        <Icon name="user" className="w-12 h-12" />
                    </div>
                    <p className="text-gray-400 text-sm mb-2">您的保險規劃顧問</p>
                    <h3 className="text-5xl font-black mb-10 tracking-tighter">趙于翔</h3>
                    <div className="space-y-4">
                        <a href="tel:0968771572" className="flex items-center justify-center gap-4 bg-white/10 py-4 rounded-2xl hover:bg-white/20 transition-all border border-white/5">
                            <Icon name="phone" className="text-[#a39171]" /> <span className="text-xl font-bold">0968-771572</span>
                        </a>
                        <div className="flex items-center justify-center gap-4 bg-white/10 py-4 rounded-2xl border border-white/5">
                            <Icon name="message-circle" className="text-[#a39171]" /> <span className="text-xl font-bold">Line: 520b0130</span>
                        </div>
                    </div>
                    <p className="mt-12 text-gray-500 text-xs">© 2026 趙于翔保險規劃顧問 版權所有</p>
                </div>
            </div>
        );

        // --- 主程式架構 ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const navItems = [
                { id: 'home', label: '首頁封面', icon: 'home' },
                { id: 'concept', label: '理財觀念', icon: 'lightbulb' },
                { id: 'checkup', label: '保單健診', icon: 'clipboard-list' },
                { id: 'products', label: '商品櫥窗', icon: 'layout-grid' },
                { id: 'contact', label: '聯絡顧問', icon: 'user' },
            ];

            const renderPage = () => {
                switch(currentPage) {
                    case 'home': return <PageHome />;
                    case 'concept': return <PageConcept />;
                    case 'checkup': return <PageCheckup />;
                    case 'products': return <PageProducts />;
                    case 'contact': return <PageContact />;
                    default: return <PageHome />;
                }
            };

            return (
                <div className="flex min-h-screen">
                    {/* PC 側邊欄 */}
                    <nav className="hidden lg:flex flex-col w-64 bg-[#4a4036] text-[#d4cfc9] fixed h-full p-6 shadow-2xl z-50">
                        <div className="mb-10 text-center">
                            <div className="w-16 h-16 bg-[#8c7a6b] rounded-2xl flex items-center justify-center mx-auto mb-4 rotate-3 shadow-lg">
                                <Icon name="shield" className="w-8 h-8 text-white" />
                            </div>
                            <h1 className="text-white font-black text-xl tracking-tighter">專業規劃系統</h1>
                        </div>
                        <div className="space-y-2 flex-grow">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => setCurrentPage(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all ${currentPage === item.id ? 'active-nav shadow-lg' : 'hover:bg-white/5'}`}>
                                    <Icon name={item.icon} /> {item.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* 手機版頂欄 */}
                    <div className="lg:hidden fixed top-0 w-full bg-[#4a4036] text-white p-4 flex justify-between items-center z-[60] shadow-md">
                        <span className="font-black tracking-tighter">趙于翔保險規劃</span>
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2"><Icon name={isMenuOpen ? "x" : "menu"} /></button>
                    </div>

                    {/* 手機版選單彈窗 */}
                    {isMenuOpen && (
                        <div className="lg:hidden fixed inset-0 bg-[#4a4036] z-[55] pt-20 p-6 flex flex-col gap-4 animate-in slide-in-from-top duration-300">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => { setCurrentPage(item.id); setIsMenuOpen(false); }} className={`w-full flex items-center gap-4 p-5 rounded-2xl font-bold text-xl ${currentPage === item.id ? 'bg-[#8c7a6b]' : 'bg-white/5'}`}>
                                    <Icon name={item.icon} className="w-6 h-6" /> {item.label}
                                </button>
                            ))}
                        </div>
                    )}

                    {/* 主內容區 */}
                    <main className="flex-grow lg:ml-64 p-6 pt-24 lg:pt-12 max-w-7xl mx-auto w-full transition-all duration-500">
                        {renderPage()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
