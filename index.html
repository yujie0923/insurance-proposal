<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全方位保險規劃 - 趙于翔</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f6f3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-nav { background-color: #8c7a6b; color: white; }
        
        /* 動畫效果 */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 圖示元件
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { 
                if (window.lucide) {
                    window.lucide.createIcons(); 
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- 輔助元件: 便利貼 ---
        const StickyNote = ({ title, code, minUnit, recommend, color = "bg-yellow-200", rotation = "-rotate-1", discontinued = false, interestSensitive = false, ageLimit, children }) => (
            <div className={`${color} p-4 rounded-md shadow-md transform ${rotation} hover:scale-105 transition-all duration-200 border border-black/5 flex flex-col relative overflow-hidden h-full`}>
                {discontinued && (
                    <div className="absolute top-3 -right-6 bg-gray-500/80 text-white text-[10px] font-bold px-6 py-1 rotate-45 shadow-sm tracking-widest z-10 pointer-events-none">
                        已停售
                    </div>
                )}
                <div className="flex justify-between items-start border-b border-black/10 pb-2 mb-2">
                    <div className="pr-2 flex-grow">
                        <div className="flex items-center gap-1">
                            <h4 className={`font-extrabold text-lg leading-none ${discontinued ? 'text-gray-500 line-through decoration-gray-400 decoration-2' : 'text-gray-800'}`}>
                                {code}
                            </h4>
                            {interestSensitive && (
                                <span className="bg-blue-100 text-blue-700 px-1 py-0.5 text-[9px] font-bold rounded border border-blue-300 shadow-sm shrink-0">
                                    利變
                                </span>
                            )}
                        </div>
                        <span className={`text-xs font-semibold mt-1 inline-block ${discontinued ? 'text-gray-500' : 'text-gray-600'}`}>
                            {title}
                        </span>
                    </div>
                    {minUnit && (
                        <span className={`px-1.5 py-0.5 text-[10px] font-bold rounded border shadow-sm shrink-0 z-10 mt-1 ${discontinued ? 'bg-gray-100 text-gray-500 border-gray-300' : 'bg-white/90 text-[#c2410c] border-[#fdba74]'}`}>
                            最低{minUnit}
                        </span>
                    )}
                </div>
                <div className={`text-sm space-y-1.5 leading-relaxed font-medium flex-grow ${discontinued ? 'text-gray-500' : 'text-gray-800'}`}>
                    {children}
                </div>
                <div className={`mt-3 pt-2 border-t ${discontinued ? 'border-gray-300' : 'border-black/10'} flex flex-col gap-1`}>
                    {recommend && (
                        <div className={`text-[12px] font-bold ${discontinued ? 'text-gray-400' : 'text-red-600'}`}>
                            建議規劃: {recommend}
                        </div>
                    )}
                    {ageLimit && (
                        <div className={`text-[10px] font-bold text-right ${discontinued ? 'text-gray-400' : 'text-[#6b5f54]'} tracking-wide`}>
                            {ageLimit}
                        </div>
                    )}
                </div>
            </div>
        );

        const SectionTitle = ({ title }) => (
            <h3 className="text-xl font-bold text-[#4a4036] border-b-2 border-[#8c7a6b] pb-2 mb-4 mt-8 first:mt-0 col-span-full flex items-center gap-2">
                <Icon name="shield-alert" className="w-5 h-5" /> {title}
            </h3>
        );

        // --- 頁面內容 ---

        // 1. 封面
        const PageHome = () => (
            <div className="flex flex-col items-center justify-center min-h-[80vh] text-center px-6 fade-in">
                <div className="w-24 h-24 bg-[#8c7a6b] rounded-full flex items-center justify-center mb-8 shadow-xl text-white">
                    <Icon name="file-heart" className="w-12 h-12" />
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-[#4a4036] mb-4 tracking-wider">全方位保險規劃</h1>
                <h2 className="text-xl md:text-2xl text-[#8c7a6b] mb-16 tracking-widest font-light uppercase">預見風險，穩健築夢</h2>
                <div className="w-full max-w-sm border-t border-[#d4cfc9] pt-8">
                    <p className="text-lg text-[#8c7a6b]">專屬保險規劃顧問</p>
                    <p className="text-3xl font-semibold text-[#4a4036] mt-2">趙于翔</p>
                </div>
            </div>
        );

        // 2. 核心觀念
        const PageConcept = () => (
            <div className="space-y-8 fade-in">
                <div className="border-l-8 border-[#8c7a6b] pl-6">
                    <h2 className="text-3xl font-black text-[#4a4036]">三階段與保險規劃</h2>
                    <p className="text-lg text-[#8c7a6b]">用 10% 風險預預算，守護 90% 的資產</p>
                </div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#e6e2dd] relative flex flex-col justify-center">
                        <h3 className="text-center font-bold text-gray-700 mb-4">人生收支與風險缺口</h3>
                        <svg viewBox="0 0 400 220" className="w-full h-auto">
                            <line x1="20" y1="180" x2="380" y2="180" stroke="#a8a29e" strokeWidth="2" />
                            <text x="60" y="200" fontSize="12" fill="#78716c">撫養期</text>
                            <text x="180" y="200" fontSize="12" fill="#78716c">奮鬥期</text>
                            <text x="320" y="200" fontSize="12" fill="#78716c">養老期</text>
                            <path d="M 20 180 Q 200 60 380 180" fill="none" stroke="#57534e" strokeWidth="2" strokeDasharray="4,4" />
                            <path d="M 90 180 C 130 40, 180 30, 210 30 C 240 30, 260 100, 280 180" fill="none" stroke="#3b82f6" strokeWidth="3" />
                            <text x="110" y="70" fontSize="12" fill="#3b82f6" fontWeight="bold">工作收入線</text>
                            <line x1="210" y1="30" x2="210" y2="180" stroke="#3b82f6" strokeWidth="2" strokeDasharray="4,4" />
                            <circle cx="210" cy="30" r="4" fill="#3b82f6" />
                            <text x="210" y="20" fontSize="12" fill="#1d4ed8" fontWeight="bold" textAnchor="middle">收入中斷</text>
                            <circle cx="170" cy="110" r="3" fill="#57534e" />
                            <text x="175" y="114" fontSize="11" fill="#57534e" fontWeight="bold">失能/長病</text>
                            <path d="M 140 180 L 360 50" fill="none" stroke="#ef4444" strokeWidth="2" />
                            <text x="310" y="40" fontSize="12" fill="#ef4444" fontWeight="bold">理財收入線</text>
                        </svg>
                        <div className="mt-6 text-sm text-gray-600 space-y-1">
                            <p>• 活太短: 家庭責任、債務留存 (壽險)</p>
                            <p>• 活太長: 退休金耗盡、通膨 (資產準備)</p>
                            <p className="text-red-600 font-semibold">• 走不了 (失能/長病): 高昂醫療、長照費</p>
                            <p className="text-blue-700 font-semibold">• 收入中斷: 日常開銷、儲蓄消耗、債務風險</p>
                        </div>
                    </div>
                    <div className="flex flex-col gap-4">
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-[#e6e2dd] flex flex-col justify-center items-center">
                            <h3 className="font-bold text-[#4a4036] mb-6 text-lg">保險金字塔架構</h3>
                            <svg viewBox="0 0 200 150" className="w-full max-w-[240px] h-auto drop-shadow-md">
                                <path d="M 0 150 L 200 150 L 166.6 100 L 33.3 100 Z" fill="#d4cfc9" stroke="#fff" strokeWidth="2" />
                                <text x="100" y="132" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#4a4036">生命保障(基礎)</text>
                                <path d="M 33.3 100 L 166.6 100 L 133.3 50 L 66.6 50 Z" fill="#e8e4db" stroke="#fff" strokeWidth="2" />
                                <text x="100" y="82" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#4a4036">財務規劃</text>
                                <path d="M 66.6 50 L 133.3 50 L 100 0 Z" fill="#f5f1ea" stroke="#fff" strokeWidth="2" />
                                <text x="100" y="38" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#4a4036">資產傳承</text>
                            </svg>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#e6e2dd] flex-grow flex flex-col items-center justify-center">
                            <h3 className="font-bold text-gray-700 mb-3 text-sm tracking-widest uppercase">收支配置矩陣</h3>
                            <div className="relative w-full max-w-[280px] aspect-square border-2 border-gray-400 grid grid-cols-2 grid-rows-2 text-center bg-white shadow-sm">
                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-white border-2 border-gray-400 rounded-full flex items-center justify-center font-bold text-gray-800 shadow-sm z-10 text-sm">收入</div>
                                <div className="border-r-2 border-b-2 border-gray-400 p-2 flex flex-col items-center justify-center bg-[#faf9f7]">
                                    <h4 className="font-bold text-[#57534e] text-sm mb-1">固定支出 40%</h4>
                                    <p className="text-[10px] text-gray-500 leading-tight">房租/水電/電話<br/>三餐/交通/教育</p>
                                </div>
                                <div className="border-b-2 border-gray-400 p-2 flex flex-col items-center justify-center bg-[#faf9f7]">
                                    <h4 className="font-bold text-[#57534e] text-sm mb-1">資產配置 25%</h4>
                                    <p className="text-[10px] text-gray-500 leading-tight">基金/股票<br/>債券/黃金</p>
                                </div>
                                <div className="border-r-2 border-gray-400 p-2 flex flex-col items-center justify-center bg-orange-50 relative border-l-4 border-l-orange-500">
                                    <h4 className="font-bold text-orange-700 text-sm mb-1 z-10">風險 10%</h4>
                                    <p className="text-[10px] text-orange-900 font-semibold leading-tight z-10">傷害/壽險/住院<br/>實支實付/癌症/手術<br/>長照/重大疾病/傷病</p>
                                </div>
                                <div className="p-2 flex flex-col items-center justify-center bg-[#faf9f7]">
                                    <h4 className="font-bold text-[#57534e] text-sm mb-1">負債 25%</h4>
                                    <p className="text-[10px] text-gray-500 leading-tight">車貸/房貸<br/>孝親</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // 3. 醫療核心基礎
        const PageCore = () => (
            <div className="space-y-8 fade-in">
                <h2 className="text-3xl font-black text-[#4a4036] text-center mb-8">醫療保障六大核心基礎</h2>
                <div className="flex flex-col lg:flex-row items-center justify-center gap-12 py-4">
                    <div className="relative w-[320px] h-[320px] shrink-0">
                        <div className="absolute top-[0px] left-[104px] w-[112px] h-[112px] bg-[#a39171] rounded-full flex items-center justify-center shadow-md text-white font-bold text-2xl border-4 border-[#f5f1ea] z-50">壽險</div>
                        <div className="absolute top-[75px] left-[16px] w-[112px] h-[112px] bg-[#a39171] rounded-full flex items-center justify-center shadow-md text-white font-bold text-2xl border-4 border-[#f5f1ea] z-40">意外</div>
                        <div className="absolute top-[75px] left-[192px] w-[112px] h-[112px] bg-[#a39171] rounded-full flex items-center justify-center shadow-md text-white font-bold text-2xl border-4 border-[#f5f1ea] z-40">住院</div>
                        <div className="absolute top-[170px] left-[52px] w-[112px] h-[112px] bg-[#a39171] rounded-full flex items-center justify-center shadow-md text-white font-bold text-2xl border-4 border-[#f5f1ea] z-30">癌症</div>
                        <div className="absolute top-[170px] left-[156px] w-[112px] h-[112px] bg-[#a39171] rounded-full flex items-center justify-center shadow-md text-white font-bold text-2xl border-4 border-[#f5f1ea] z-30">手術</div>
                        <div className="absolute top-[260px] left-0 w-full text-center z-50">
                            <span className="text-4xl font-extrabold text-white tracking-widest" style={{textShadow: "2px 2px 4px rgba(0,0,0,0.4), -1px 1px 0 #a39171, 1px -1px 0 #a39171, -1px 1px 0 #a39171, 1px 1px 0 #a39171"}}>長照</span>
                        </div>
                    </div>
                    <div className="w-full lg:w-1/2 max-w-md flex flex-col gap-6">
                        <div className="bg-white p-5 rounded-xl border-2 border-red-200 shadow-sm relative">
                            <div className="absolute -top-3 left-3 bg-red-100 text-red-700 px-3 py-1 font-bold text-xs rounded shadow-sm flex items-center gap-1">
                                <Icon name="alert-circle" className="w-3 h-3"/> 重點知識
                            </div>
                            <h3 className="text-lg font-bold text-[#4a4036] mb-3 border-b pb-2 mt-2">重大疾病包含哪些? (共7項)</h3>
                            <ul className="grid grid-cols-1 sm:grid-cols-2 gap-y-1 text-gray-700 font-medium text-sm">
                                <li className="flex items-center gap-2"><Icon name="check-circle" className="w-4 h-4 text-red-500" /> 1. 腦中風後障礙(重度)</li>
                                <li className="flex items-center gap-2"><Icon name="check-circle" className="w-4 h-4 text-red-500" /> 2. 急性心肌梗塞(重度)</li>
                                <li className="flex items-center gap-2 sm:col-span-2"><Icon name="check-circle" className="w-4 h-4 text-red-500" /> 3. 冠狀動脈路徑型手術</li>
                                <li className="flex items-center gap-2"><Icon name="check-circle" className="w-4 h-4 text-red-500" /> 4. 末期腎病變</li>
                                <li className="flex items-center gap-2"><Icon name="check-circle" className="w-4 h-4 text-red-500" /> 5. 癌症(重度)</li>
                                <li className="flex items-center gap-2"><Icon name="check-circle" className="w-4 h-4 text-red-500" /> 6. 癱瘓(重度)</li>
                                <li className="flex items-center gap-2 sm:col-span-2"><Icon name="check-circle" className="w-4 h-4 text-red-500" /> 7. 重大器官或造血幹細胞移植</li>
                            </ul>
                        </div>
                        <div className="bg-yellow-200 p-6 rounded-sm shadow-md border border-yellow-300 transform rotate-1 transition-transform hover:rotate-0">
                            <p className="font-bold text-lg text-black mb-3">人身保險不外乎:</p>
                            <ol className="list-decimal pl-6 space-y-1.5 text-gray-900 font-medium text-base">
                                <li>壽險、重大傷病險及重大疾病險</li>
                                <li>意外險及意外實支實付</li>
                                <li>住院日額及住院實支實付</li>
                                <li>手術險 (含手術或處置)</li>
                                <li>防癌險</li>
                                <li>長照險及失能險</li>
                            </ol>
                            <div className="mt-4 pt-3 border-t border-yellow-400 text-gray-900 font-medium text-sm">
                                <p>1~5 是醫療保障的核心基礎</p>
                                <p>6 是未來趨勢</p>
                                <p className="font-bold mt-1 text-[#4a4036]">保障齊了，就要做資產規劃</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // 4. 保單健診
        const PageCheckup = () => {
            const checkupRows = [
                { id: 'life', icon: 'shield', label: "壽險 (家庭責任/債務留存)", color: "text-blue-600", hasDailyRate: false },
                { id: 'accident', icon: 'activity', label: "意外險 (意外身故/失能/醫療)", color: "text-amber-500", hasDailyRate: true },
                { id: 'medical', icon: 'stethoscope', label: "醫療險 (病房差額/手術/雜費)", color: "text-sky-500", hasDailyRate: true },
                { id: 'cancer', icon: 'heart-pulse', label: "癌症與重疾 (標靶/一次金)", color: "text-rose-500", hasDailyRate: false },
                { id: 'ltc', icon: 'user-round', label: "長照與失能 (外籍看護/收入中斷)", color: "text-green-600", hasDailyRate: false },
            ];

            return (
                <div className="space-y-6 fade-in">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h2 className="text-3xl font-black text-[#4a4036] flex items-center gap-3">
                            保單健診與缺口分析 <Icon name="edit-3" className="w-6 h-6 text-[#8c7a6b]"/>
                        </h2>
                        <div className="text-sm bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                            <Icon name="info" /> 可點擊虛線欄位輸入客戶資料
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl shadow-xl overflow-x-auto border border-[#e6e2dd] p-4">
                        <table className="w-full text-left border-collapse min-w-[750px]">
                            <thead>
                                <tr className="bg-[#8c7a6b] text-white">
                                    <th className="py-4 px-6 font-bold text-lg rounded-tl-lg w-[30%]">保障項目 (險種)</th>
                                    <th className="py-4 px-6 font-bold text-lg w-[35%]">原有保障額度</th>
                                    <th className="py-4 px-6 font-bold text-lg rounded-tr-lg w-[35%]">缺口分析 / 建議規劃</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {checkupRows.map((row, idx) => (
                                    <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                        <td className="py-6 px-6 align-top">
                                            <div className="flex items-center gap-3">
                                                <div className={`p-2 rounded-full bg-white shadow-sm border border-gray-100 ${row.color}`}>
                                                    <Icon name={row.icon} className="w-5 h-5" />
                                                </div>
                                                <span className="font-bold text-gray-800 leading-snug">{row.label}</span>
                                            </div>
                                        </td>
                                        <td className="py-6 px-6 align-top">
                                            <input type="text" placeholder="輸入現有額度..." className="w-full bg-transparent border-b border-gray-300 border-dashed pb-1 outline-none focus:border-blue-500 focus:border-solid text-lg text-blue-700 font-medium transition-colors" />
                                            {row.hasDailyRate && (
                                                <div className="mt-4 bg-[#fdfbf7] p-3 rounded-lg border border-[#e6e2dd] shadow-sm">
                                                    <div className="text-xs font-bold text-[#8c7a6b] mb-2 border-b pb-1 flex items-center gap-1">
                                                        <Icon name="stethoscope" className="w-3 h-3"/> 日額保障細節
                                                    </div>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        <div className="flex flex-col">
                                                            <label className="text-[10px] text-gray-400 mb-0.5">終身險日額</label>
                                                            <input type="text" className="w-full bg-transparent border-b border-gray-200 outline-none text-xs text-center p-0.5" placeholder="0" />
                                                        </div>
                                                        <div className="flex flex-col">
                                                            <label className="text-[10px] text-gray-400 mb-0.5">定期險日額</label>
                                                            <input type="text" className="w-full bg-transparent border-b border-gray-200 outline-none text-xs text-center p-0.5" placeholder="0" />
                                                        </div>
                                                        <div className="flex flex-col bg-blue-50/50 p-0.5 rounded">
                                                            <label className="text-[10px] text-blue-700 font-bold mb-0.5">總日額</label>
                                                            <input type="text" className="w-full bg-transparent border-b border-blue-200 outline-none text-xs font-bold text-blue-700 text-center p-0.5" placeholder="0" />
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </td>
                                        <td className="py-6 px-6 align-top">
                                            <textarea placeholder="填寫專業分析與規劃建議..." className="w-full min-h-[60px] bg-transparent border-b border-gray-300 border-dashed pb-1 outline-none focus:border-red-500 focus:border-solid text-lg text-red-700 font-medium transition-colors resize-none" />
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // 5. 商品櫥窗 (包含完整內容)
        const PageProducts = () => {
            const [cat, setCat] = useState('life');
            const categories = [
                { id: 'life', label: '壽險', icon: 'shield' },
                { id: 'accident', label: '意外險', icon: 'activity' },
                { id: 'medical', label: '醫療/手術', icon: 'stethoscope' },
                { id: 'cancer', label: '防癌/尖端', icon: 'heart-pulse' },
                { id: 'critical', label: '重疾/傷病', icon: 'shield-alert' },
                { id: 'ltc', label: '長照/失能', icon: 'user-round' },
            ];

                            <h1 className="text-white font-black text-xl tracking-tighter">專業規劃系統</h1>
                        </div>
                        <div className="space-y-2 flex-grow overflow-y-auto no-scrollbar">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => setCurrentPage(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all ${currentPage === item.id ? 'active-nav shadow-lg scale-105' : 'hover:bg-white/5'}`}>
                                    <Icon name={item.icon} /> {item.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* 手機版頂欄 */}
                    <div className="lg:hidden fixed top-0 w-full bg-[#4a4036] text-white p-4 flex justify-between items-center z-[60] shadow-md">
                        <div className="flex items-center gap-2">
                            <Icon name="shield" className="w-5 h-5 text-[#8c7a6b]" />
                            <span className="font-black tracking-tighter">趙于翔保險規劃</span>
                        </div>
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 transition-transform active:scale-90">
                            <Icon name={isMenuOpen ? "x" : "menu"} />
                        </button>
                    </div>

                    {/* 手機版選單彈窗 */}
                    {isMenuOpen && (
                        <div className="lg:hidden fixed inset-0 bg-[#4a4036] z-[55] pt-20 p-6 flex flex-col gap-4 animate-in slide-in-from-top duration-300">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => { setCurrentPage(item.id); setIsMenuOpen(false); }} className={`w-full flex items-center gap-4 p-5 rounded-2xl font-bold text-xl ${currentPage === item.id ? 'bg-[#8c7a6b]' : 'bg-white/5'}`}>
                                    <Icon name={item.icon} className="w-6 h-6" /> {item.label}
                                </button>
                            ))}
                        </div>
                    )}

                    {/* 主內容區 */}
                    <main className="flex-grow lg:ml-64 p-6 pt-24 lg:pt-12 max-w-7xl mx-auto w-full transition-all duration-500 overflow-x-hidden">
                        {renderPage()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
