<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全方位保險規劃 - 趙于翔</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>

        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 圖示元件

        };

        // --- 輔助元件: 橫向單欄商品卡片 ---
        const ProductRowCard = ({ title, code, minUnit, recommend, color = "border-blue-200", discontinued = false, interestSensitive = false, ageLimit, highlight, children }) => (
            <div className={`w-full bg-white rounded-xl shadow-sm border-l-4 ${color} border-y border-r border-gray-200 flex flex-col lg:flex-row relative overflow-hidden group hover:shadow-md transition-shadow mb-4`}>

                    <div className="absolute top-0 right-0 bg-gray-500 text-white text-[10px] font-bold px-4 py-1 rounded-bl-lg shadow-sm tracking-widest z-10 pointer-events-none">
                        已停售
                    </div>
                )}
                
                {/* 左側：商品基本資訊 */}
                <div className="w-full lg:w-1/3 bg-gray-50/50 p-5 border-b lg:border-b-0 lg:border-r border-gray-200 flex flex-col justify-center">

                            <span className={`px-2.5 py-1 text-xs font-black rounded text-white ${discontinued ? 'bg-gray-400' : 'bg-orange-600'}`}>

                        )}

                            <span className={`px-2.5 py-1 text-xs font-black rounded border ${discontinued ? 'border-gray-300 text-gray-400' : 'border-red-200 text-red-600 bg-red-50'}`}>

                        <div className="bg-orange-50/80 rounded-md p-2.5 mb-3 border border-orange-100 text-sm font-bold text-orange-900 flex items-start gap-2">

                    {ageLimit && (

        );

        const SectionTitle = ({ title, subtitle }) => (

                <p className="text-lg text-[#8c7a6b] mb-6 pl-5 font-bold">盤點既有資源，補強風險缺口 (可點擊輸入)</p>

                                <th className="p-6 font-black text-xl w-1/3">現有額度</th>
